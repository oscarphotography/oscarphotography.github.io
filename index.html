<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Photography</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        line-height: 1.6;
    }

    header {
        text-align: center;
        padding: 60px 20px;
        background: #000;
    }

    header h1 {
        font-size: 3em;
        margin: 0;
    }

    header p {
        color: #bbb;
        margin-top: 10px;
    }

    nav {
        text-align: center;
        padding: 15px;
        background: #1a1a1a;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-weight: bold;
    }

    .section {
        padding: 50px 10%;
    }

    .section h2 {
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }

    .gallery img {
        width: 100%;
        display: block;
        border-radius: 6px;
    }

    footer {
        text-align: center;
        padding: 40px 20px;
        color: #888;
        border-top: 1px solid #333;
    }

    .contact a {
        color: #fff;
    }
</style>
</head>

<body>

<header>
    <h1>Oscar Photography</h1>
    <p>Real Estate Photography • Wet Collodion • Analog Processes</p>
</header>

<nav>
    <a href="#street">Street</a>
    <a href="#collodion">Wet Collodion</a>
    <a href="#portraits">Portraits</a>
    <a href="#contact">Contact</a>
</nav>

<section id="street" class="section">
    <h2>Street Photography</h2>
    <div class="gallery">
        <img src="images/street1.jpg" alt="Street photography">
        <img src="images/street2.jpg" alt="Street photography">
    </div>
</section>

<section id="collodion" class="section">
    <h2>Wet Collodion</h2>
    <div class="gallery">
        <img src="images/collodion1.jpg" alt="Wet collodion">
        <img src="images/collodion2.jpg" alt="Wet collodion">
    </div>
</section>

<section id="portraits" class="section">
    <h2>Portraits & Fine Art</h2>
    <div class="gallery">
        <img src="images/portrait1.jpg" alt="Portrait">
        <img src="images/landscape1.jpg" alt="Fine art">
    </div>
</section>

<section id="contact" class="section contact">
    <h2>Contact</h2>
    <p>Email: <a href="mailto:tuemail@email.com">tuemail@email.com</a></p>
    <p>Instagram: <a href="https://instagram.com/tuusuario" target="_blank">@tuusuario</a></p>
</section>

<footer>
    <p>© 2026 Oscar Bernal Photography</p>
</footer>

</body>
</html>

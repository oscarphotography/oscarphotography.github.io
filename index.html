<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Photography</title>

<style>

   /* Grid de enlaces */
.gallery-links{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
    padding:60px 10%;
}

/* Tarjeta */
.gallery-card{
    position:relative;
    overflow:hidden;
    border-radius:6px;
    text-decoration:none;
}

/* Imagen */
.gallery-card img{
    width:100%;
    height:350px;
    object-fit:cover;
    display:block;
    transition:transform 0.4s ease;
}

/* Texto sobrepuesto */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.overlay h2{
    color:white;
    font-size:2rem;
    text-transform:uppercase;
    letter-spacing:2px;
    border:none;
    padding:0;
    margin:0;
}

/* Efecto hover */
.gallery-card:hover img{
    transform:scale(1.05);
}

/* Responsive móvil */
@media (max-width:768px){
    .gallery-links{
        grid-template-columns:1fr;
        padding:30px 5%;
    }

    .gallery-card img{
        height:280px;
    }

    .overlay h2{
        font-size:1.5rem;
    }
}
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: Arial, sans-serif;
        background:#111;
        color:white;
    }

    /* Banner superior */
    .top-banner{
        background:white;
        padding:8px 0;
        text-align:center;
    }

    .logo{
        width:120px;
        height:120px;
        object-fit:cover;
        border-radius:6px;
    }

    /* Foto de portada */
    .hero{
        width:100%;
        height:500px;
        overflow:hidden;
    }

    .hero img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
    }

    /* Navegación */
    nav{
        background:#111;
        text-align:center;
        padding:25px 10px;
        border-bottom:1px solid #333;
    }

    nav a{
        color:white;
        text-decoration:none;
        margin:0 20px;
        font-weight:bold;
        letter-spacing:1px;
        font-size:14px;
        text-transform:uppercase;
    }

    nav a:hover{
        color:#cccccc;
    }

    /* Contenido */
    .section{
        padding:60px 10%;
    }

    h2{
        margin-bottom:20px;
        border-bottom:1px solid #333;
        padding-bottom:10px;
    }

    .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:15px;
    }

    .gallery img{
        width:100%;
        border-radius:4px;
    }

    footer{
        text-align:center;
        padding:40px 20px;
        color:#888;
        border-top:1px solid #333;
    }
</style>
</head>

<body>

<!-- Banner blanco con logo -->
<div class="top-banner">
    <img src="images/logo.jpg" alt="Logo" class="logo">
</div>

<!-- Foto de portada -->
<div class="hero">
    <img src="images/cover.jpg" alt="Cover photo">
</div>

<!-- Navegación -->
<nav>
    <a href="#realestate">Real Estate </a>
    <a href="#street">Street</a>
    <a href="#about">Who I Am</a>
    <a href="#contact">Contact</a>
</nav>
<!-- Grid de galerías -->
<section class="gallery-links">

    <a href="realestate.html" class="gallery-card">
        <img src="images/realestate-cover.jpg" alt="Real Estate">
        <div class="overlay">
            <h2>Real Estate </h2>
        </div>
    </a>

    <a href="street.html" class="gallery-card">
        <img src="images/street-cover.jpg" alt="Street">
        <div class="overlay">
            <h2>Street</h2>
        </div>
    </a>

    <a href="about.html" class="gallery-card">
        <img src="images/about-cover.jpg" alt="Who I Am">
        <div class="overlay">
            <h2>Who I Am</h2>
        </div>
    </a>

    <a href="contact.html" class="gallery-card">
        <img src="images/contact-cover.jpg" alt="Contact">
        <div class="overlay">
            <h2>Contact</h2>
        </div>
    </a>

</section>
   

<footer>
    <p>© 2026 Oscar Photography</p>
</footer>

</body>
</html>
